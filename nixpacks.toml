[phases.setup]
nixPkgs = ["python311", "nodejs_22"]

[phases.install]
cmds = [
  "python -m pip install -r requirements.txt",
  "cd 05_webapp/frontend && npm ci"
]

[phases.build]
cmds = ["cd 05_webapp/frontend && npm run build"]

[start]
cmd = "uvicorn app:app --app-dir 05_webapp/backend --host 0.0.0.0 --port $PORT"
